{% extends 'onboarding_base.html' %}


{% block content %}
<div class="jumbotron">
    <h1 class="h3 mb-3 font-weight-normal">Cadastrar novo usuário</h1>
    <form method="POST">
        {% csrf_token %}

        {% for field in registration_form %}
        <div class="form-group">
            {{ field.label_tag }}
            {{ field }}
        </div>

        {% for error in field.errors %}
        <div class="alert alert-danger" role="alert">
        	{{ error }}
        </div>
        {% endfor %}

        {% endfor %}
        <div class="row">
            <div class="col-md-12">
                <button type="submit" class="btn btn-primary">Registrar</button>
                <a href="{% url 'home' %}" class="btn btn-link float-right">Voltar</a>
            </div>
        </div>
    </form>
</div>
{% endblock content %}
