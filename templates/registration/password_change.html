{% extends 'base.html' %}

{% block header %}
<h3 class="float-left">Solicitação para mudar senha</h3>
{% endblock header %}

{% block content %}
<form method="POST" class="form-signin p-3">
    {% csrf_token %}

    <div class="form-row">
        <div class="col-md">
            <div class="form-group">
                <label for="old_password">Senha antiga:</label>
                <input name="old_password" class="form-control" placeholder="Digite a senha antiga" type="password"
                    id="id_old_password" required="true">
            </div>
        </div>
        <div class="col-md">
            <div class="form-group">
                <label for="new_password1">Nova senha:</label>
                <input name="new_password1" class="form-control" placeholder="Digite a nova senha" type="password"
                    id="id_new_password1" required="true">
            </div>
        </div>
        <div class="col-md">
            <div class="form-group">
                <label for="new_password1">Confirmar nova senha:</label>
                <input name="new_password2" class="form-control" placeholder="Digite a nova senha novamente" type="password"
                    id="id_new_password2" required="true">
            </div>
        </div>
    </div>

    {% for field in form %}
    {% for error in field.errors %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endfor %}
    {% endfor %}

    <button class="btn btn-primary" type="submit">Salvar</button>
</form>
{% endblock %}
