{% extends 'registration_base.html' %}


{% block content %}
<div class="jumbotron">
    <form method="POST" class="form-signin">
        {% csrf_token %}

        <h1 class="h3 mb-3 font-weight-normal">Solicitação para resetar senha</h1>
        <div class="form-group">
            <label for="email">Digite seu email:</label>
            <input name="email" class="form-control" placeholder="Email" type="email" id="id_email" required="true">
        </div>

        <div class="row">
            <div class="col-md-12">
                <button class="btn btn-primary" type="submit">Enviar solicitação</button>
                <a href="{% url 'home' %}" class="btn btn-link float-right">Voltar</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
